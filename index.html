<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <title>Frontend Mentor | QR code component</title>

      <style>
        :root{
          --white: hsl(0, 0%, 100%);
          --slate-300: hsl(212, 45%, 89%);
          --slate-500: hsl(216, 15%, 48%);
          --slate-900: hsl(218, 44%, 22%);
          --blue: #2f80ed;
        }

        html,body{ height:100%; }
        body{
          margin:0;
          font-family: 'Outfit', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
          background: var(--slate-300);
          display:flex;
          align-items:center;
          justify-content:center;
          padding:32px 16px;
        }

        .card{
          width: min(92%, 300px);
          background: var(--white);
          border-radius: 24px;
          padding: 24px;
          text-align:center;
          color: var(--slate-900);
        }

        .qr-wrap{
          background: var(--blue);
          padding: 28px;
          border-radius: 12px;
          display:inline-block;
        }
        .qr-wrap img{ display:block; width: 200px; max-width: 100%; height:auto; }

        .card h1{
          font-size: 18px;
          margin: 20px 0 10px;
          line-height:1.2;
          font-weight:700;
          color: var(--slate-900);
        }
        .card p{
          margin:0;
          margin-top:12px;
          color: var(--slate-500);
          font-size:15px;
          line-height:1.5;
          font-weight:400;
        }

        .attribution{ font-size:0.75rem; text-align:center; color:var(--slate-500); margin-top:18px; }
        .attribution a{ color: var(--blue); text-decoration:none; }

        @media (min-width: 768px){
          .card{ width: 300px; padding:28px; }
          .qr-wrap{ padding:28px; }
          .qr-wrap img{ width: 210px; }
        }

      </style>

</head>
<body>
  <div class="card">
    <div class="qr-wrap">
      <img src="images/image-qr-code.png" alt="QR code">
    </div>
    <h1>Improve your front-end skills by building projects</h1>
    <p>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
   <!--  <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. Coded by <a href="#">Mehmet </a>.
    </footer> -->
  </div>
</body>
</html>
